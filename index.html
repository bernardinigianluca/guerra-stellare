<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Guerra Stellare</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg0: #02030a;
      --bg1: #08111f;
      --glow: rgba(255, 196, 78, 0.28);
      --panel: rgba(8, 14, 30, 0.76);
      --line: rgba(123, 163, 255, 0.2);
    }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: "Courier New", monospace;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 204, 120, 0.16), transparent 28%),
        radial-gradient(circle at 18% 82%, rgba(60, 120, 255, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg1), var(--bg0) 60%);
      color: #dfe9ff;
      touch-action: manipulation;
      user-select: none;
    }
    .game-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(11, 18, 36, 0.92), rgba(5, 9, 20, 0.9));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.58), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }
    canvas {
      display: block;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      background: #02030b;
      image-rendering: auto;
      touch-action: none;
    }
    .touch-ui {
      width: 100%;
      display: none;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }
    .pad {
      display: grid;
      grid-template-columns: repeat(3, 64px);
      grid-template-rows: repeat(3, 52px);
      gap: 8px;
    }
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 132px;
    }
    .touch-btn {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(21, 31, 61, 0.94), rgba(9, 14, 31, 0.94));
      color: #f3f6ff;
      font: bold 18px "Courier New", monospace;
      min-height: 52px;
      min-width: 52px;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.28);
      touch-action: manipulation;
    }
    .touch-btn:active,
    .touch-btn.active {
      transform: translateY(1px) scale(0.98);
      background: linear-gradient(180deg, rgba(42, 65, 116, 0.98), rgba(20, 30, 59, 0.98));
      border-color: rgba(255, 212, 94, 0.5);
    }
    .touch-btn.fire {
      min-height: 74px;
      background: linear-gradient(180deg, rgba(135, 40, 24, 0.98), rgba(85, 22, 13, 0.98));
      border-color: rgba(255, 163, 123, 0.38);
    }
    .touch-btn.alt {
      font-size: 16px;
      color: #c8d7ff;
    }
    .touch-btn.ghost {
      visibility: hidden;
      pointer-events: none;
    }
    @media (pointer: coarse), (max-width: 920px) {
      body {
        align-items: flex-start;
        padding: 12px;
        overflow: auto;
      }
      .game-shell {
        width: min(100%, 920px);
        padding: 12px;
        gap: 12px;
      }
      .touch-ui {
        display: flex;
      }
    }
  </style>
</head>
<body>
<div class="game-shell" id="game-shell">
  <canvas id="c"></canvas>
  <div class="touch-ui" id="touch-ui" aria-label="Controlli touch">
    <div class="pad">
      <button class="touch-btn ghost" type="button" aria-hidden="true"></button>
      <button class="touch-btn" type="button" data-key="ArrowUp">▲</button>
      <button class="touch-btn ghost" type="button" aria-hidden="true"></button>
      <button class="touch-btn" type="button" data-key="ArrowLeft">◀</button>
      <button class="touch-btn ghost" type="button" aria-hidden="true"></button>
      <button class="touch-btn" type="button" data-key="ArrowRight">▶</button>
      <button class="touch-btn ghost" type="button" aria-hidden="true"></button>
      <button class="touch-btn" type="button" data-key="ArrowDown">▼</button>
      <button class="touch-btn ghost" type="button" aria-hidden="true"></button>
    </div>
    <div class="action-buttons">
      <button class="touch-btn fire" type="button" data-key="Space">FUOCO</button>
      <button class="touch-btn alt" type="button" data-key="KeyP">PAUSA</button>
    </div>
  </div>
</div>
<script>'use strict';

const W = 820, H = 660;
const shell = document.getElementById('game-shell');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const touchUI = document.getElementById('touch-ui');
canvas.width = W; canvas.height = H;

function syncViewport() {
  const controlsVisible = matchMedia('(pointer: coarse), (max-width: 920px)').matches;
  const scale = controlsVisible
    ? Math.max(0.54, Math.min((window.innerWidth - 36) / W, 1.08))
    : Math.max(0.5, Math.min((window.innerWidth - 44) / W, (window.innerHeight - 42) / H, 1.22));
  canvas.style.width = Math.round(W * scale) + 'px';
  canvas.style.height = Math.round(H * scale) + 'px';
  shell.style.width = Math.round(W * scale + 28) + 'px';
}

addEventListener('resize', syncViewport);
addEventListener('orientationchange', syncViewport);

const falconSprite = new Image();
let falconSpriteReady = false;
falconSprite.onload = () => { falconSpriteReady = true; };
falconSprite.src = 'falcon_millenian.png';

const tieSprite = new Image();
let tieSpriteReady = false;
tieSprite.onload = () => { tieSpriteReady = true; };
tieSprite.src = 'tie_fighter.png';

const vaderSprite = new Image();
let vaderSpriteReady = false;
vaderSprite.onload = () => { vaderSpriteReady = true; };
vaderSprite.src = 'caza_dark_vater.png';

const BEST_KEY = 'guerra-stellare-best';

function loadBest() {
  try {
    return Number(localStorage.getItem(BEST_KEY) || 0) || 0;
  } catch {
    return 0;
  }
}

function saveBest(value) {
  try {
    localStorage.setItem(BEST_KEY, String(value));
  } catch {
    // Ignore storage failures in local file mode.
  }
}

// ── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx = null, masterGain = null;
let muted = false, musicStarted = false, musicNodes = [];
let introMusicStarted = false, introMusicNodes = [], introMusicTimer = null;
const introTrack = new Audio('star-wars.mp3');
introTrack.preload = 'auto';
introTrack.loop = true;
introTrack.volume = 0.58;
const battleTrack = new Audio('star-wars-battlie.mp3');
battleTrack.preload = 'auto';
battleTrack.loop = true;
battleTrack.volume = 0.48;
const falconShootTrack = new Audio('star-wars-battlie2.mp3');
falconShootTrack.preload = 'auto';
falconShootTrack.volume = 0.46;
const FALCON_SHOOT_SFX_COOLDOWN = 95;
let lastFalconShootSfxAt = -Infinity;

function playFalconShootSfx() {
  if (muted) return;
  const now = performance.now();
  if (now - lastFalconShootSfxAt < FALCON_SHOOT_SFX_COOLDOWN) return;
  lastFalconShootSfxAt = now;
  const shot = falconShootTrack.cloneNode();
  shot.volume = falconShootTrack.volume;
  shot.muted = muted;
  shot.play().catch(() => {
    // Ignore playback failures from browser autoplay policies.
  });
}

function ensureAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.55;
  masterGain.connect(audioCtx.destination);
}

function tone(freq, type, dur, vol, freqEnd, delay) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime + (delay || 0);
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t0 + dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g); g.connect(masterGain);
  osc.start(t0); osc.stop(t0 + dur + 0.01);
}

function noise(dur, vol, filtFreq, filtQ, delay) {
  if (!audioCtx || muted) return;
  const t0  = audioCtx.currentTime + (delay || 0);
  const buf = audioCtx.createBuffer(1, Math.ceil(audioCtx.sampleRate * dur), audioCtx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const flt = audioCtx.createBiquadFilter();
  flt.type = 'bandpass'; flt.frequency.value = filtFreq; flt.Q.value = filtQ || 1;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  src.connect(flt); flt.connect(g); g.connect(masterGain);
  src.start(t0);
}

const SFX = {
  shoot()  { playFalconShootSfx(); },
  eShoot() { tone(520,'sawtooth',0.13,0.09,190); },
  explodeSmall()  { noise(0.24,0.42,750,0.9); tone(160,'sawtooth',0.14,0.17,45); },
  explodeMedium() { noise(0.38,0.62,480,0.6); tone(100,'sine',0.28,0.26,28); noise(0.18,0.28,1400,0.8); },
  explodeBig()    {
    noise(0.85,0.88,170,0.3); noise(0.55,0.68,650,0.4);
    noise(0.32,0.48,2100,0.6); tone(68,'sine',0.7,0.44,17); tone(175,'sawtooth',0.44,0.28,36);
  },
  playerHit()    { tone(370,'sawtooth',0.32,0.36,52); noise(0.3,0.52,540,0.6); },
  extraLife()    { [523,659,784,1047].forEach((f,i) => tone(f,'sine',0.18,0.28,null,i*0.10)); },
  waveComplete() { [392,494,587,784,988].forEach((f,i) => tone(f,'square',0.22,0.18,null,i*0.09)); },
  gameOver()     { [523,440,349,220].forEach((f,i) => tone(f,'sine',0.38,0.30,null,i*0.26)); },
  crawlEnter()   {
    tone(294, 'triangle', 0.35, 0.17, 220, 0);
    tone(440, 'sawtooth', 0.22, 0.11, 330, 0.08);
    tone(587, 'sine', 0.26, 0.1, 440, 0.16);
  },
  mothershipAlarm() {
    for (let i = 0; i < 3; i++) {
      tone(820,'square',0.09,0.17,null, i*0.22);
      tone(560,'square',0.09,0.11,null, i*0.22 + 0.11);
    }
  }
};

function startMusic() {
  if (!audioCtx || musicStarted) return;
  musicStarted = true;
  // Bass drone
  const bassO = audioCtx.createOscillator();
  const bassG = audioCtx.createGain();
  bassO.type = 'sine'; bassO.frequency.value = 55; bassG.gain.value = muted ? 0 : 0.068;
  bassO.connect(bassG); bassG.connect(masterGain); bassO.start();
  musicNodes.push(bassO);
  // Detuned pad layers
  [[110,0.028],[111.5,0.022],[165,0.018]].forEach(([f,v]) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f; g.gain.value = v;
    o.connect(g); g.connect(masterGain); o.start();
    musicNodes.push(o);
  });
  // Arpeggio loop
  const seq = [220,277,330,370,440,554,659,370];
  let idx = 0;
  (function arp() {
    if (!musicStarted) return;
    tone(seq[idx % seq.length], 'triangle', 0.26, 0.052);
    idx++;
    setTimeout(arp, Math.max(175, 310 - GS.wave * 9));
  })();
}

function stopMusic() {
  musicStarted = false;
  for (const n of musicNodes) {
    try { n.stop(); } catch { /* node already stopped */ }
  }
  musicNodes = [];
}

function stopIntroMusic() {
  introMusicStarted = false;
  if (introMusicTimer) {
    clearTimeout(introMusicTimer);
    introMusicTimer = null;
  }
  introTrack.pause();
  introTrack.currentTime = 0;
  for (const n of introMusicNodes) {
    try { n.stop(); } catch { /* node already stopped */ }
  }
  introMusicNodes = [];
}

function stopBattleMusic() {
  battleTrack.pause();
  battleTrack.currentTime = 0;
  stopMusic();
}

function startBattleMusic() {
  stopMusic();
  battleTrack.muted = muted;
  battleTrack.play().catch(() => {
    // In battle we want only the provided MP3 as background music.
  });
}

function startIntroSynthMusic() {
  if (!audioCtx) return;

  const drone = audioCtx.createOscillator();
  const droneGain = audioCtx.createGain();
  drone.type = 'triangle';
  drone.frequency.value = 73.4;
  droneGain.gain.value = muted ? 0 : 0.048;
  drone.connect(droneGain);
  droneGain.connect(masterGain);
  drone.start();
  introMusicNodes.push(drone);

  const pad = audioCtx.createOscillator();
  const padGain = audioCtx.createGain();
  pad.type = 'sine';
  pad.frequency.value = 146.8;
  padGain.gain.value = muted ? 0 : 0.03;
  pad.connect(padGain);
  padGain.connect(masterGain);
  pad.start();
  introMusicNodes.push(pad);

  const melody = [294, 392, 440, 523, 587, 523, 440, 392, 349, 440, 494, 587];
  let idx = 0;
  (function introLoop() {
    if (!introMusicStarted || GS.mode !== 'intro') return;
    const note = melody[idx % melody.length];
    tone(note, 'square', 0.2, 0.08);
    if (idx % 3 === 2) tone(note * 0.5, 'sine', 0.28, 0.05, note * 0.4, 0.02);
    idx++;
    introMusicTimer = setTimeout(introLoop, 270);
  })();
}

function startIntroMusic() {
  if (introMusicStarted) return;
  introMusicStarted = true;
  introTrack.muted = muted;
  const playPromise = introTrack.play();
  if (playPromise && typeof playPromise.catch === 'function') {
    playPromise.catch(() => {
      if (introMusicStarted && GS.mode === 'intro') startIntroSynthMusic();
    });
    return;
  }
  if (introTrack.paused) startIntroSynthMusic();
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function rand(a, b) { return a + Math.random() * (b - a); }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function dist2(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
function rectHit(ax, ay, aw, ah, bx, by, bw, bh) {
  return Math.abs(ax - bx) < (aw + bw) * 0.5 && Math.abs(ay - by) < (ah + bh) * 0.5;
}

// ── STARS ────────────────────────────────────────────────────────────────────
const STARS = Array.from({length: 200}, () => ({
  x: rand(0, W), y: rand(0, H),
  r: rand(0.2, 1.8), spd: rand(0.08, 0.55), a: rand(0.25, 0.95)
}));

// ── INPUT ─────────────────────────────────────────────────────────────────────
const K = {}, KP = {};

function pressControl(code) {
  ensureAudio();
  if (!K[code]) KP[code] = true;
  K[code] = true;
}

function releaseControl(code) {
  K[code] = false;
}

addEventListener('keydown', e => {
  pressControl(e.code);
  if (/Arrow|Space/.test(e.code)) e.preventDefault();
});
addEventListener('keyup', e => { releaseControl(e.code); });
addEventListener('blur', () => {
  for (const code in K) K[code] = false;
  for (const code in KP) delete KP[code];
});

for (const btn of touchUI.querySelectorAll('[data-key]')) {
  const code = btn.dataset.key;
  const down = ev => {
    ev.preventDefault();
    btn.classList.add('active');
    pressControl(code);
  };
  const up = ev => {
    ev.preventDefault();
    btn.classList.remove('active');
    releaseControl(code);
  };
  btn.addEventListener('pointerdown', down);
  btn.addEventListener('pointerup', up);
  btn.addEventListener('pointercancel', up);
  btn.addEventListener('pointerleave', up);
  btn.addEventListener('contextmenu', ev => ev.preventDefault());
}

// ── GAME STATE ────────────────────────────────────────────────────────────────
const GS = {
  mode: 'menu', score: 0, best: loadBest(), lives: 3, wave: 1, waveKills: 0,
  combo: 1, comboTimer: 0, message: '', messageTimer: 0, shake: 0, introTime: 0, introCueDone: false,
  phase: 'space', trenchProgress: 0
};
const WAVE_SIZE = 30;
const ENEMY_SIZE_FACTOR = 0.55;
const SHIELD_DURATION = 10;
const INTRO_DURATION = 26;
const TRENCH_GOAL = 3600;
const INTRO_CRAWL = [
  'EPISODIO UNO',
  '',
  'L IMPERO ATTACCA IL SETTORE',
  'CON FLOTTE SEMPRE PIU AGGRESSIVE.',
  '',
  'TU GUIDI IL MILLENNIUM FALCON',
  'NEL CUORE DELLA BATTAGLIA.',
  '',
  'OBIETTIVO:',
  'ABBATTI I CACCIA NEMICI,',
  'SOPRAVVIVI ALLE ONDATE,',
  'E DISTRUGGI LA NAVE NODRIZA',
  'PER OTTENERE SCUDO E VITA EXTRA.',
  '',
  'ATTENTO AGLI ASTEROIDI,',
  'ALLE PICCHIATE IMPERIALI,',
  'E AL CAPO OSCURO IN TESTA',
  'ALLA FORMAZIONE.',
  '',
  'LA GALASSIA CONTA SU DI TE...'
];

// ── ENTITY COLLECTIONS ────────────────────────────────────────────────────────
let player, bullets, eBullets, enemies, mothership, explosions, asteroids;
let eGroup, motherTimer;
let trenchEnemies, trenchSpawnTimer, trenchShootTimer, exhaustPort;
let cinematicState;

// ── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  GS.score = 0; GS.lives = 3; GS.wave = 1; GS.waveKills = 0;
  GS.combo = 1; GS.comboTimer = 0; GS.shake = 0;
  GS.phase = 'space';
  GS.trenchProgress = 0;
  player = { x: W / 2, y: H - 95, spd: 320, inv: 0, shield: 0, shot: 0 };
  bullets = []; eBullets = []; explosions = []; asteroids = [];
  trenchEnemies = [];
  trenchSpawnTimer = 0.55;
  trenchShootTimer = 0.8;
  exhaustPort = {
    active: false,
    x: W * 0.5,
    y: 118,
    w: 46,
    h: 24,
    hp: 10,
    maxHp: 10,
    open: false,
    cycle: 0,
    blockHintCd: 0
  };
  cinematicState = null;
  mothership = null; motherTimer = 18 + rand(0, 8);
  spawnWave();
}

function startIntro() {
  stopBattleMusic();
  GS.mode = 'intro';
  GS.introTime = 0;
  GS.introCueDone = false;
  startIntroMusic();
}

function startGame() {
  stopIntroMusic();
  GS.mode = 'play';
  init();
  startBattleMusic();
}

function setMessage(text, ttl) {
  GS.message = text;
  GS.messageTimer = ttl || 1.8;
}

function bumpShake(amount) {
  GS.shake = Math.max(GS.shake, amount);
}

function addScore(base) {
  GS.score += base * GS.combo;
  GS.combo = Math.min(GS.combo + 1, 5);
  GS.comboTimer = 3.2;
  if (GS.combo >= 4) setMessage('COMBO x' + GS.combo, 0.9);
}

function spawnWave() {
  enemies = [];
  eGroup = { dx: 1, speed: 40 + GS.wave * 10, shoot: 1.4 };
  setMessage('ONDA ' + GS.wave, 1.8);

  const vaderSlot = { x: W * 0.5, y: 38 };
  const vaderHp = 10 + Math.floor(GS.wave * 1.5);

  enemies.push({
    x: vaderSlot.x, y: vaderSlot.y,
    bx: vaderSlot.x, by: vaderSlot.y,
    w: 76, h: 76, type: 'vader',
    hp: vaderHp,
    maxHp: vaderHp,
    alive: true, anim: rand(0, 6.28), dive: null
  });

  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 6; c++) {
      const x = 115 + c * 98;
      const y = 75 + r * 66;
      const type = r === 0 ? 'boss' : r < 3 ? 'mid' : 'basic';
      enemies.push({
        x, y,
        bx: x, by: y,
        w: 52 * ENEMY_SIZE_FACTOR, h: 38 * ENEMY_SIZE_FACTOR, type,
        hp: type === 'boss' ? 3 : 1,
        maxHp: type === 'boss' ? 3 : 1,
        alive: true, anim: rand(0, 6.28), dive: null
      });
    }
  }
}

function startDeathStarRun() {
  GS.phase = 'trench';
  GS.wave = 2;
  GS.waveKills = 0;
  GS.trenchProgress = 0;
  enemies = [];
  asteroids = [];
  mothership = null;
  bullets = [];
  eBullets = [];
  trenchEnemies = [];
  trenchSpawnTimer = 0.55;
  trenchShootTimer = 0.8;
  player.x = W * 0.5;
  player.y = H * 0.72;
  player.inv = 1.8;
  player.shield = Math.max(player.shield, 2.5);
  exhaustPort.active = false;
  exhaustPort.hp = exhaustPort.maxHp;
  exhaustPort.open = false;
  exhaustPort.cycle = 0;
  exhaustPort.blockHintCd = 0;
  cinematicState = null;
  setMessage('LIVELLO 2: TRINCEA DELLA MORTE NERA', 3.2);
}

function spawnTrenchEnemy() {
  const side = Math.floor(Math.random() * 3);
  const typeRoll = Math.random();
  const kind = typeRoll < 0.5 ? 'interceptor' : typeRoll < 0.85 ? 'turret' : 'bomber';
  const type = kind === 'bomber' ? 'boss' : kind === 'interceptor' ? 'mid' : 'basic';
  let x = W * 0.5;
  let y = -40;

  if (side === 0) {
    x = W * 0.5 - 220;
    y = rand(130, H - 120);
  } else if (side === 1) {
    x = W * 0.5 + 220;
    y = rand(130, H - 120);
  } else {
    x = rand(W * 0.5 - 160, W * 0.5 + 160);
    y = -35;
  }

  const ang = Math.atan2(player.y - y, player.x - x);
  const speedBase = kind === 'interceptor' ? 210 : kind === 'bomber' ? 125 : 155;
  const speed = speedBase + GS.trenchProgress * 0.02 + rand(16, 62);
  trenchEnemies.push({
    x,
    y,
    w: 52 * ENEMY_SIZE_FACTOR,
    h: 38 * ENEMY_SIZE_FACTOR,
    type,
    kind,
    hp: kind === 'bomber' ? 4 : kind === 'interceptor' ? 2 : 1,
    maxHp: kind === 'bomber' ? 4 : kind === 'interceptor' ? 2 : 1,
    alive: true,
    anim: rand(0, 6.28),
    seed: rand(0, 6.28),
    vx: Math.cos(ang) * speed,
    vy: Math.sin(ang) * speed * 0.85 + 18
  });
}

function startDeathStarEscapeCinematic() {
  cinematicState = {
    t: 0,
    duration: 6.2,
    nextBoom: 0.12
  };
  GS.mode = 'cinematic';
  player.inv = 999;
  player.shield = 0;
  bullets = [];
  eBullets = [];
  trenchEnemies = [];
  setMessage('COLPO A SEGNO! FUGA IMMEDIATA!', 2.8);
}

function updateCinematic(dt) {
  if (!cinematicState) return;
  cinematicState.t += dt;

  const escapeT = clamp(cinematicState.t / cinematicState.duration, 0, 1);
  const tx = W * (0.5 + 0.28 * escapeT);
  const ty = H * (0.72 + 0.2 * Math.pow(escapeT, 0.72));
  player.x += (tx - player.x) * Math.min(1, dt * 4.8);
  player.y += (ty - player.y) * Math.min(1, dt * 4.8);

  GS.trenchProgress = TRENCH_GOAL;
  GS.shake = Math.max(GS.shake, 0.35 + escapeT * 0.85);

  cinematicState.nextBoom -= dt;
  if (cinematicState.nextBoom <= 0) {
    const rx = W * 0.5 + rand(-185, 185);
    const ry = rand(80, H - 34);
    mkExplosion(rx, ry, rand(28, 90));
    if (Math.random() < 0.35) SFX.explodeMedium();
    cinematicState.nextBoom = Math.max(0.05, 0.18 - escapeT * 0.11);
  }

  explosions = explosions.filter(e => { e.t -= dt; return e.t > 0; });

  if (cinematicState.t >= cinematicState.duration) {
    GS.mode = 'victory';
    setMessage('LA MORTE NERA ESPLODE NEL VUOTO', 3.5);
    stopBattleMusic();
    if (GS.score > GS.best) {
      GS.best = GS.score;
      saveBest(GS.best);
    }
  }
}

// ── DRAW: TIE FIGHTER ────────────────────────────────────────────────────────
function drawTIEFallback(x, y, type, anim, hp, maxHp) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(ENEMY_SIZE_FACTOR, ENEMY_SIZE_FACTOR);

  const PC = type === 'boss' ? '#882211' : type === 'mid' ? '#1a3a88' : '#1a6633';
  const GC = type === 'boss' ? '#aa4433' : type === 'mid' ? '#3355aa' : '#338855';

  // Wings (mirrored)
  for (const sx of [-1, 1]) {
    ctx.save(); ctx.scale(sx, 1);
    ctx.beginPath();
    ctx.moveTo(13, -21); ctx.lineTo(38, -18);
    ctx.lineTo(40, 0); ctx.lineTo(38, 18); ctx.lineTo(13, 21);
    ctx.closePath();
    ctx.fillStyle = PC; ctx.fill();
    ctx.strokeStyle = '#111'; ctx.lineWidth = 1.5; ctx.stroke();
    // Panel grid
    ctx.strokeStyle = GC; ctx.lineWidth = 0.65;
    for (const gy of [-13, -5, 3, 11]) {
      ctx.beginPath(); ctx.moveTo(13, gy); ctx.lineTo(40, gy * 0.83); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(13, -21); ctx.lineTo(40, -18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(13, 21); ctx.lineTo(40, 18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(13, 0); ctx.lineTo(40, 0); ctx.stroke();
    // Strut
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(13, 0); ctx.lineTo(17, 0); ctx.stroke();
    ctx.restore();
  }

  // Central pod
  ctx.beginPath(); ctx.arc(0, 0, 13.5, 0, Math.PI * 2);
  ctx.fillStyle = '#2a2a2a'; ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2);
  ctx.strokeStyle = '#555'; ctx.lineWidth = 0.8; ctx.stroke();

  // Eye / viewport (pulsing)
  const pulse = 0.65 + 0.35 * Math.sin(anim * 2.8);
  ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2);
  ctx.fillStyle = type === 'boss' ? `rgba(255,70,20,${pulse})` :
                  type === 'mid'  ? `rgba(80,110,255,${pulse})` :
                                    `rgba(20,210,80,${pulse})`;
  ctx.fill();

  // HP bar (boss only)
  if (type === 'boss') {
    ctx.fillStyle = '#220000'; ctx.fillRect(-18, -32, 36, 4);
    ctx.fillStyle = '#ff3300'; ctx.fillRect(-18, -32, 36 * (hp / maxHp), 4);
  }

  ctx.restore();
}

function triggerEnemyPanic(sourceX, sourceY) {
  if (!eGroup) return;
  eGroup.dx = -eGroup.dx;
  eGroup.speed = Math.min(eGroup.speed + 18, 120);
  eGroup.shoot = Math.max(eGroup.shoot, 0.9);
  for (const other of enemies) {
    if (!other.alive || other.type === 'vader') continue;
    const ang = Math.atan2(other.y - sourceY, other.x - sourceX);
    const spd = rand(135, 210) + GS.wave * 6;
    other.dive = { vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 20, t: 1.45 + rand(0, 0.55) };
  }
}

function destroyEnemy(e) {
  e.alive = false;
  GS.waveKills++;
  if (e.type === 'vader') {
    addScore(90);
    mkExplosion(e.x, e.y, 110);
    SFX.explodeBig();
    bumpShake(0.95);
    setMessage('DARK VATER DISTRUTTO', 2.1);
    triggerEnemyPanic(e.x, e.y);
    return;
  }
  addScore(e.type === 'boss' ? 30 : e.type === 'mid' ? 20 : 10);
  mkExplosion(e.x, e.y, 32);
  SFX.explodeSmall();
  bumpShake(0.18);
}

// ── DRAW: ASTEROID ───────────────────────────────────────────────────────────
function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y); ctx.rotate(a.rot);
  // Build asteroid shape path once for layered lighting.
  const shape = new Path2D();
  for (let i = 0; i < a.pts.length; i++) {
    const [px, py] = a.pts[i];
    if (i === 0) shape.moveTo(px, py);
    else shape.lineTo(px, py);
  }
  shape.closePath();

  const pulse = 0.5 + 0.5 * Math.sin(a.rot * 1.6);
  const shadowOffset = a.r * (0.18 + pulse * 0.08);
  const shadowBlur = a.r * 0.24;

  ctx.shadowColor = 'rgba(0,0,0,0.38)';
  ctx.shadowBlur = shadowBlur;
  ctx.shadowOffsetX = shadowOffset;
  ctx.shadowOffsetY = shadowOffset * 0.55;
  ctx.fillStyle = '#2d2319';
  ctx.fill(shape);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  const body = ctx.createRadialGradient(-a.r * 0.35, -a.r * 0.4, a.r * 0.15, a.r * 0.25, a.r * 0.3, a.r * 1.28);
  body.addColorStop(0, '#8f7961');
  body.addColorStop(0.45, '#6a5441');
  body.addColorStop(1, '#2e241b');
  ctx.fillStyle = body;
  ctx.fill(shape);

  const rim = ctx.createLinearGradient(-a.r, -a.r, a.r, a.r);
  rim.addColorStop(0, 'rgba(221,196,166,0.58)');
  rim.addColorStop(0.35, 'rgba(170,140,108,0.15)');
  rim.addColorStop(1, 'rgba(35,27,20,0.6)');
  ctx.strokeStyle = rim;
  ctx.lineWidth = 1.8;
  ctx.stroke(shape);

  for (const c of a.craters) {
    const cg = ctx.createRadialGradient(c.x - c.rr * 0.35, c.y - c.rr * 0.35, c.rr * 0.2, c.x, c.y, c.rr);
    cg.addColorStop(0, 'rgba(30,22,16,0.78)');
    cg.addColorStop(1, 'rgba(90,70,52,0.38)');
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.rr, c.rr * c.squeeze, c.rot, 0, Math.PI * 2);
    ctx.fillStyle = cg;
    ctx.fill();
    ctx.strokeStyle = 'rgba(188,160,126,0.32)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  const spec = ctx.createRadialGradient(-a.r * 0.5, -a.r * 0.58, a.r * 0.05, -a.r * 0.42, -a.r * 0.45, a.r * 0.72);
  spec.addColorStop(0, 'rgba(255,230,195,0.3)');
  spec.addColorStop(1, 'rgba(255,230,195,0)');
  ctx.fillStyle = spec;
  ctx.fill(shape);
  ctx.restore();
}

function mkAsteroid() {
  const r = rand(18, 34);
  const pts = Array.from({length: 8}, (_, i) => {
    const a = (i / 8) * Math.PI * 2 + rand(-0.35, 0.35);
    const rr = r * rand(0.6, 1.05);
    return [Math.cos(a) * rr, Math.sin(a) * rr];
  });
  const craters = Array.from({length: Math.floor(rand(3, 6))}, () => ({
    x: rand(-r * 0.45, r * 0.45),
    y: rand(-r * 0.35, r * 0.4),
    rr: rand(r * 0.09, r * 0.2),
    rot: rand(0, Math.PI * 2),
    squeeze: rand(0.7, 1.05)
  }));
  const side = Math.random() < 0.5;
  return {
    x: side ? -55 : W + 55,
    y: rand(80, H - 110),
    r, vx: (side ? 1 : -1) * rand(35, 85),
    vy: rand(-18, 18), rot: 0,
    rotSpd: rand(-1.2, 1.2), pts, craters
  };
}

// ── DRAW: BULLET ─────────────────────────────────────────────────────────────
function drawBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  const isP = b.own === 'p';
  const c0 = isP ? 'rgba(120,255,220,0)' : 'rgba(255,70,20,0)';
  const c1 = isP ? '#8bffe8' : '#ff6622';
  const g = ctx.createLinearGradient(0, -b.l * 0.5, 0, b.l * 0.5);
  g.addColorStop(0, c0); g.addColorStop(0.45, c1); g.addColorStop(1, c0);
  if (isP) {
    ctx.shadowColor = 'rgba(115,255,235,0.95)';
    ctx.shadowBlur = 16;
    ctx.fillStyle = g;
    ctx.fillRect(-2.8, -b.l * 0.5, 5.6, b.l);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(225,255,245,0.98)';
    ctx.fillRect(-0.95, -b.l * 0.5, 1.9, b.l);
  } else {
    ctx.fillStyle = g;
    ctx.fillRect(-1.8, -b.l * 0.5, 3.6, b.l);
  }
  ctx.beginPath(); ctx.arc(0, 0, isP ? 3.2 : 2.5, 0, Math.PI * 2);
  ctx.fillStyle = isP ? 'rgba(215,255,240,0.96)' : 'rgba(255,150,80,0.85)'; ctx.fill();
  ctx.restore();
}

// ── DRAW: EXPLOSION ──────────────────────────────────────────────────────────
function drawExplosion(e) {
  const p = 1 - e.t / e.T;
  // Shockwave ring
  if (p < 0.45) {
    const sr = e.r * (p / 0.45);
    ctx.beginPath(); ctx.arc(e.x, e.y, sr, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,200,90,${(0.45 - p) / 0.45})`; ctx.lineWidth = 2.5; ctx.stroke();
  }
  // Particles
  for (const pk of e.pk) {
    const px = e.x + pk.vx * p * e.T;
    const py = e.y + pk.vy * p * e.T;
    const alpha = (1 - p) * pk.a;
    const pr = pk.r * (1 - p * 0.55);
    ctx.beginPath(); ctx.arc(px, py, Math.max(0.1, pr), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${pk.big ? '255,160,40' : '255,70,20'},${alpha})`; ctx.fill();
  }
}

function drawTrenchScene() {
  const t = Date.now() * 0.001;
  const corridorX = W * 0.5;
  const half = 190;

  ctx.fillStyle = '#0e1016';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#151923';
  ctx.fillRect(corridorX - half - 46, 0, 46, H);
  ctx.fillRect(corridorX + half, 0, 46, H);

  ctx.fillStyle = '#1b2130';
  ctx.fillRect(corridorX - half, 0, half * 2, H);

  ctx.strokeStyle = 'rgba(140,170,220,0.18)';
  ctx.lineWidth = 1;
  for (let y = ((t * 130) % 34) - 34; y < H + 34; y += 34) {
    ctx.beginPath();
    ctx.moveTo(corridorX - half, y);
    ctx.lineTo(corridorX + half, y);
    ctx.stroke();
  }

  for (let i = 0; i < 14; i++) {
    const y = ((i * 55 + t * 90) % (H + 80)) - 40;
    const w = 16 + (i % 3) * 8;
    ctx.fillStyle = 'rgba(125,160,220,0.18)';
    ctx.fillRect(corridorX - half + 20 + (i % 5) * 66, y, w, 8);
    ctx.fillRect(corridorX + half - 36 - (i % 4) * 70, y + 15, w, 8);
  }

  ctx.strokeStyle = 'rgba(170,205,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(corridorX - half, 0);
  ctx.lineTo(corridorX - half, H);
  ctx.moveTo(corridorX + half, 0);
  ctx.lineTo(corridorX + half, H);
  ctx.stroke();

  if (exhaustPort && exhaustPort.active) {
    const isOpen = exhaustPort.open;
    const pulse = 0.55 + 0.45 * Math.sin(Date.now() * 0.01);
    ctx.save();
    ctx.translate(exhaustPort.x, exhaustPort.y);
    ctx.fillStyle = isOpen ? '#0f131d' : '#242a36';
    ctx.fillRect(-exhaustPort.w * 0.5, -exhaustPort.h * 0.5, exhaustPort.w, exhaustPort.h);
    ctx.strokeStyle = isOpen ? 'rgba(148,185,255,0.52)' : 'rgba(190,210,255,0.3)';
    ctx.strokeRect(-exhaustPort.w * 0.5, -exhaustPort.h * 0.5, exhaustPort.w, exhaustPort.h);
    if (isOpen) {
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 92, 56, ${0.45 + pulse * 0.4})`;
      ctx.fill();
    } else {
      ctx.fillStyle = 'rgba(96, 112, 140, 0.95)';
      ctx.fillRect(-6.5, -2.5, 13, 5);
    }
    ctx.restore();

    ctx.fillStyle = isOpen ? '#ffbb7a' : '#b5c4da';
    ctx.font = 'bold 13px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(isOpen ? 'PUNTO DEBOLE APERTO' : 'BOCCA CHIUSA', exhaustPort.x, exhaustPort.y - 18);
  }
}

function mkExplosion(x, y, r) {
  explosions.push({
    x, y, r, t: 0.65, T: 0.65,
    pk: Array.from({length: 22}, () => {
      const a = rand(0, Math.PI * 2), s = rand(r * 0.25, r * 1.0);
      return { vx: Math.cos(a) * s, vy: Math.sin(a) * s, r: rand(1.5, 5.5), a: rand(0.5, 1), big: Math.random() < 0.4 };
    })
  });
}

function drawIntroCrawl() {
  ctx.textAlign = 'center';

  const t = GS.introTime;
  const speed = 48;
  const baseY = H + 170 - t * speed;
  const outroFade = clamp((t - (INTRO_DURATION - 5.2)) / 5.2, 0, 1);
  const outroAlpha = 1 - Math.pow(outroFade, 1.35);

  const titleGlow = 0.6 + 0.4 * Math.sin(Date.now() * 0.003);
  ctx.fillStyle = `rgba(255, 210, 96, ${0.35 * titleGlow * outroAlpha})`;
  ctx.font = 'bold 24px "Courier New"';
  ctx.fillText('TRASMISSIONE OLOGRAFICA', W * 0.5, 88);

  for (let i = 0; i < INTRO_CRAWL.length; i++) {
    const line = INTRO_CRAWL[i];
    const y = baseY + i * 62;
    if (y < 70 || y > H + 120) continue;

    const p = clamp((y - 78) / (H - 78), 0, 1);
    const scale = 0.26 + p * 1.06;
    const alpha = (0.08 + p * 0.9) * outroAlpha;

    ctx.save();
    ctx.translate(W * 0.5, y);
    ctx.scale(scale, scale * 0.9);
    ctx.fillStyle = `rgba(255, 214, 102, ${alpha})`;
    ctx.font = 'bold 42px "Courier New"';
    ctx.fillText(line, 0, 0);
    ctx.restore();
  }

  const fade = clamp((INTRO_DURATION - t) / 2.2, 0, 1);
  ctx.fillStyle = `rgba(10, 18, 34, ${0.5 + 0.5 * (1 - fade)})`;
  ctx.fillRect(0, H - 66, W, 66);
  ctx.fillStyle = 'rgba(160, 190, 255, 0.88)';
  ctx.font = '16px "Courier New"';
  ctx.fillText('INVIO: salta briefing   ESC: torna al menu', W * 0.5, H - 26);

  if (outroFade > 0) {
    ctx.fillStyle = `rgba(2, 5, 14, ${Math.min(0.92, outroFade * 0.92)})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = `rgba(255, 208, 120, ${outroFade * 0.9})`;
    ctx.font = 'bold 20px "Courier New"';
    ctx.fillText('TRASMISSIONE IN CHIUSURA...', W * 0.5, H * 0.5 + 120);
  }
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update(dt) {
  if (GS.mode === 'intro') {
    GS.introTime += dt;
    if (!GS.introCueDone && GS.introTime >= 0.95) {
      GS.introCueDone = true;
      SFX.crawlEnter();
    }
    if (GS.introTime >= INTRO_DURATION) startGame();
    return;
  }

  if (GS.mode === 'cinematic') {
    updateCinematic(dt);
    return;
  }

  if (GS.mode !== 'play') return;

  if (GS.comboTimer > 0) GS.comboTimer -= dt;
  else GS.combo = 1;
  if (GS.messageTimer > 0) GS.messageTimer -= dt;
  if (GS.shake > 0) GS.shake = Math.max(0, GS.shake - dt * 2.2);

  if (GS.phase === 'trench') {
    updateTrenchRun(dt);
    return;
  }

  // ── Player movement
  let mx = 0, my = 0;
  if (K.ArrowLeft)  mx -= 1;
  if (K.ArrowRight) mx += 1;
  if (K.ArrowUp)    my -= 1;
  if (K.ArrowDown)  my += 1;
  if (mx && my) { mx *= 0.707; my *= 0.707; }
  player.x = clamp(player.x + mx * player.spd * dt, 48, W - 48);
  player.y = clamp(player.y + my * player.spd * dt, 58, H - 48);
  if (player.inv > 0) player.inv -= dt;
  if (player.shield > 0) player.shield -= dt;
  if (player.shot > 0) player.shot -= dt;

  // ── Shoot
  if (K.Space && player.shot <= 0) {
    player.shot = 0.17;
    SFX.shoot();
    const by = player.y - 30;
    bullets.push({ x: player.x - 7, y: by, vx: 0, vy: -680, l: 26, own: 'p' });
    bullets.push({ x: player.x + 7, y: by, vx: 0, vy: -680, l: 26, own: 'p' });
  }

  // ── Move bullets
  bullets = bullets.filter(b => {
    b.x += b.vx * dt; b.y += b.vy * dt;
    return b.y > -25 && b.y < H + 25 && b.x > -25 && b.x < W + 25;
  });
  eBullets = eBullets.filter(b => {
    b.x += b.vx * dt; b.y += b.vy * dt;
    return b.y > -25 && b.y < H + 25 && b.x > -25 && b.x < W + 25;
  });

  // ── Enemies
  const alive = enemies.filter(e => e.alive);
  if (alive.length === 0) {
    if (GS.wave === 1) {
      SFX.waveComplete();
      startDeathStarRun();
    } else {
      GS.wave++;
      GS.waveKills = 0;
      SFX.waveComplete();
      setMessage('SETTORE RIPULITO', 1.3);
      spawnWave();
    }
    return;
  }

  const speedMult = 1 + (WAVE_SIZE - alive.length) / WAVE_SIZE * 1.8;

  // Find formation bounds (non-diving only)
  let minX = Infinity, maxX = -Infinity;
  for (const e of alive) {
    if (!e.dive) { minX = Math.min(minX, e.x); maxX = Math.max(maxX, e.x); }
  }
  let drop = false;
  if (maxX + 30 > W - 6 && eGroup.dx > 0)  { eGroup.dx = -1; drop = true; }
  if (minX - 30 < 6  && eGroup.dx < 0)      { eGroup.dx =  1; drop = true; }

  const step = eGroup.speed * speedMult * dt;
  const drift = (5 + GS.wave * 1.2) * dt;

  for (const e of enemies) {
    if (!e.alive) continue;
    e.anim += dt;

    if (e.dive) {
      e.x += e.dive.vx * dt;
      e.y += e.dive.vy * dt;
      e.dive.t -= dt;
      if (e.dive.t <= 0 || e.y > H + 40) {
        if (e.y > H + 40) { e.x = e.bx; e.y = e.by; }
        e.dive = null;
      }
    } else {
      e.x += eGroup.dx * step;
      e.bx = e.x;
      if (drop) { e.y += 20; e.by = e.y; }
      e.y += drift; e.by = e.y;
      // Reached player area
      if (e.y > H - 72) {
        e.alive = false; GS.waveKills++;
        hitPlayer();
      }
    }
  }

  // ── Enemy shooting
  eGroup.shoot -= dt;
  if (eGroup.shoot <= 0) {
    const shooters = alive.filter(e => !e.dive);
    if (shooters.length) {
      const s = shooters[Math.floor(Math.random() * shooters.length)];
      const ang = Math.atan2(player.y - s.y, player.x - s.x);
      const spd = 195 + GS.wave * 18;
      SFX.eShoot();
      eBullets.push({ x: s.x, y: s.y + 14, vx: Math.cos(ang) * spd * 0.32, vy: spd, l: 13, own: 'e' });
    }
    eGroup.shoot = Math.max(0.32, 1.3 - GS.wave * 0.08) + rand(0, 0.38);
  }

  // ── Random dive attack
  if (Math.random() < 0.006 * speedMult) {
    const nonDiving = alive.filter(e => !e.dive);
    if (nonDiving.length) {
      const d = nonDiving[Math.floor(Math.random() * nonDiving.length)];
      const ang = Math.atan2(player.y - d.y, player.x - d.x);
      const spd = 165 + GS.wave * 24;
      d.dive = { vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd + 55, t: 2.8 };
    }
  }

  // ── Mothership
  motherTimer -= dt;
  if (motherTimer <= 0 && !mothership) {
    const dir = Math.random() < 0.5 ? 1 : -1;
    const hp = 10 + GS.wave * 2;
    mothership = { x: dir > 0 ? -120 : W + 120, y: 60, vx: dir * 88, hp, maxHp: hp };
    motherTimer = 20 + rand(0, 10);
    SFX.mothershipAlarm();
  }
  if (mothership) {
    mothership.x += mothership.vx * dt;
    if (mothership.x < -140 || mothership.x > W + 140) mothership = null;
  }

  // ── Asteroids
  if (Math.random() < 0.007) asteroids.push(mkAsteroid());
  asteroids = asteroids.filter(a => {
    a.x += a.vx * dt; a.y += a.vy * dt; a.rot += a.rotSpd * dt;
    return a.x > -110 && a.x < W + 110 && a.y > -110 && a.y < H + 110;
  });

  // ── Explosions
  explosions = explosions.filter(e => { e.t -= dt; return e.t > 0; });

  // ── Collisions
  // Player bullets vs enemies
  outer: for (const b of bullets) {
    for (const e of enemies) {
      if (!e.alive) continue;
      if (rectHit(b.x, b.y, 4, 14, e.x, e.y, e.w, e.h)) {
        b.own = 'x';
        e.hp--;
        if (e.hp <= 0) {
          destroyEnemy(e);
        }
        continue outer;
      }
    }
    // vs mothership
    if (mothership && b.own !== 'x') {
      if (rectHit(b.x, b.y, 4, 14, mothership.x, mothership.y, 184, 62)) {
        b.own = 'x';
        mothership.hp--;
        if (mothership.hp <= 0) {
          mkExplosion(mothership.x, mothership.y, 88);
          SFX.explodeBig();
          SFX.extraLife();
          player.shield = SHIELD_DURATION;
          GS.score += (150 + GS.wave * 20) * GS.combo;
          GS.lives = Math.min(GS.lives + 1, 6);
          GS.combo = Math.min(GS.combo + 1, 5);
          GS.comboTimer = 3.2;
          setMessage('NODRIZA DISTRUTTA  +1 VITA  +SCUDO', 2.4);
          bumpShake(0.7);
          mothership = null;
        }
      }
    }

    if (b.own !== 'x') {
      for (const a of asteroids) {
        if (dist2(b.x, b.y, a.x, a.y) < a.r + 5) {
          b.own = 'x';
          a.vx = 9999;
          GS.score += 5;
          mkExplosion(a.x, a.y, a.r * 1.1);
          SFX.explodeMedium();
          bumpShake(0.12);
          continue outer;
        }
      }
    }
  }
  bullets = bullets.filter(b => b.own !== 'x');

  if (player.inv > 0 || player.shield > 0) return; // invincible, skip damage checks

  // Enemy bullets vs player
  for (const b of eBullets) {
    if (rectHit(b.x, b.y, 5, 5, player.x, player.y, 62, 44)) {
      b.own = 'x'; hitPlayer(); break;
    }
  }
  eBullets = eBullets.filter(b => b.own !== 'x');

  // Diving enemy vs player
  for (const e of enemies) {
    if (!e.alive || !e.dive) continue;
    if (rectHit(e.x, e.y, e.w, e.h, player.x, player.y, 64, 46)) {
      e.alive = false; GS.waveKills++;
      mkExplosion(e.x, e.y, 34);
      SFX.explodeSmall();
      hitPlayer(); break;
    }
  }

  // Asteroids vs player
  for (const a of asteroids) {
    if (dist2(a.x, a.y, player.x, player.y) < a.r + 29) {
      mkExplosion(a.x, a.y, a.r * 1.6);
      SFX.explodeMedium();
      a.vx = 9999; // push out of bounds next frame
      hitPlayer(); break;
    }
  }
}

function hitPlayer() {
  if (player.inv > 0 || player.shield > 0) return;
  player.inv = 2.4;
  player.x = W * 0.5;
  player.y = H - 95;
  GS.lives--;
  GS.combo = 1;
  GS.comboTimer = 0;
  SFX.playerHit();
  mkExplosion(player.x, player.y, 58);
  bumpShake(0.58);
  setMessage('SCAFI COLPITI', 1.2);
  if (GS.lives <= 0) {
    stopBattleMusic();
    GS.mode = 'over';
    SFX.gameOver();
    if (GS.score > GS.best) {
      GS.best = GS.score;
      saveBest(GS.best);
    }
  }
}

function updateTrenchRun(dt) {
  // Trench movement limits keep the Falcon over the Death Star surface corridor.
  let mx = 0, my = 0;
  if (K.ArrowLeft)  mx -= 1;
  if (K.ArrowRight) mx += 1;
  if (K.ArrowUp)    my -= 1;
  if (K.ArrowDown)  my += 1;
  if (mx && my) { mx *= 0.707; my *= 0.707; }
  player.x = clamp(player.x + mx * player.spd * dt, W * 0.5 - 165, W * 0.5 + 165);
  player.y = clamp(player.y + my * player.spd * dt, 104, H - 54);
  if (player.inv > 0) player.inv -= dt;
  if (player.shield > 0) player.shield -= dt;
  if (player.shot > 0) player.shot -= dt;

  if (K.Space && player.shot <= 0) {
    player.shot = 0.16;
    SFX.shoot();
    const by = player.y - 34;
    bullets.push({ x: player.x - 7, y: by, vx: 0, vy: -700, l: 28, own: 'p' });
    bullets.push({ x: player.x + 7, y: by, vx: 0, vy: -700, l: 28, own: 'p' });
  }

  GS.trenchProgress = Math.min(TRENCH_GOAL, GS.trenchProgress + dt * 170);

  trenchSpawnTimer -= dt;
  if (trenchSpawnTimer <= 0) {
    spawnTrenchEnemy();
    const density = 0.58 - Math.min(0.28, GS.trenchProgress / TRENCH_GOAL * 0.24);
    trenchSpawnTimer = Math.max(0.22, density + rand(0, 0.24));
  }

  trenchShootTimer -= dt;
  if (trenchShootTimer <= 0 && trenchEnemies.length) {
    const weighted = trenchEnemies.filter(e => e.kind !== 'interceptor' || Math.random() < 0.45);
    const shooterPool = weighted.length ? weighted : trenchEnemies;
    const shooter = shooterPool[Math.floor(Math.random() * shooterPool.length)];
    const ang = Math.atan2(player.y - shooter.y, player.x - shooter.x);
    const spd = 230 + GS.trenchProgress / 90 + (shooter.kind === 'bomber' ? 28 : 0);
    const spread = shooter.kind === 'turret' ? 0.14 : 0.06;
    eBullets.push({ x: shooter.x, y: shooter.y + 12, vx: Math.cos(ang - spread) * spd * 0.38, vy: spd, l: 14, own: 'e' });
    if (shooter.kind === 'turret') {
      eBullets.push({ x: shooter.x, y: shooter.y + 12, vx: Math.cos(ang + spread) * spd * 0.38, vy: spd, l: 14, own: 'e' });
    }
    SFX.eShoot();
    trenchShootTimer = Math.max(0.26, 0.74 - GS.trenchProgress / 9000) + rand(0, 0.22);
  }

  for (const e of trenchEnemies) {
    if (!e.alive) continue;
    e.anim += dt;
    if (e.kind === 'interceptor') {
      e.vx += Math.sin(e.anim * 6 + e.seed) * 20 * dt;
      e.vy += Math.cos(e.anim * 4 + e.seed) * 12 * dt;
    } else if (e.kind === 'turret') {
      e.vx *= 0.986;
      e.vx += Math.sin(e.anim * 2 + e.seed) * 8 * dt;
      e.vy = Math.min(145, e.vy + 6 * dt);
    } else if (e.kind === 'bomber') {
      const towardX = clamp(player.x - e.x, -140, 140);
      e.vx += towardX * dt * 0.34;
      e.vy = Math.min(185, e.vy + 9 * dt);
    }
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    e.vx *= 0.998;
    if (e.y > H + 55 || e.x < W * 0.5 - 240 || e.x > W * 0.5 + 240) {
      e.alive = false;
    }
  }

  bullets = bullets.filter(b => {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    return b.y > -40 && b.y < H + 40 && b.x > W * 0.5 - 230 && b.x < W * 0.5 + 230;
  });

  eBullets = eBullets.filter(b => {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    return b.y > -35 && b.y < H + 35 && b.x > W * 0.5 - 260 && b.x < W * 0.5 + 260;
  });

  if (GS.trenchProgress >= TRENCH_GOAL * 0.84) {
    exhaustPort.active = true;
    exhaustPort.cycle += dt;
    exhaustPort.open = (exhaustPort.cycle % 3.8) < 1.35;
    if (exhaustPort.blockHintCd > 0) exhaustPort.blockHintCd -= dt;
    exhaustPort.x = W * 0.5 + Math.sin(Date.now() * 0.003) * 76;
  }

  outerTrench: for (const b of bullets) {
    for (const e of trenchEnemies) {
      if (!e.alive) continue;
      if (rectHit(b.x, b.y, 4, 14, e.x, e.y, e.w, e.h)) {
        b.own = 'x';
        e.hp--;
        if (e.hp <= 0) {
          e.alive = false;
          GS.waveKills++;
          addScore(e.type === 'boss' ? 35 : e.type === 'mid' ? 20 : 12);
          mkExplosion(e.x, e.y, e.type === 'boss' ? 46 : 30);
          if (e.type === 'boss') SFX.explodeMedium();
          else SFX.explodeSmall();
        }
        continue outerTrench;
      }
    }

    if (exhaustPort.active && b.own !== 'x') {
      if (rectHit(b.x, b.y, 4, 14, exhaustPort.x, exhaustPort.y, exhaustPort.w, exhaustPort.h)) {
        b.own = 'x';
        if (exhaustPort.open) {
          exhaustPort.hp--;
          bumpShake(0.2);
          if (exhaustPort.hp <= 0) {
            mkExplosion(exhaustPort.x, exhaustPort.y - 18, 140);
            SFX.explodeBig();
            startDeathStarEscapeCinematic();
          }
        } else {
          mkExplosion(exhaustPort.x, exhaustPort.y, 18);
          if (exhaustPort.blockHintCd <= 0) {
            setMessage('BERSAGLIO CHIUSO! ATTENDI APERTURA', 1.4);
            exhaustPort.blockHintCd = 1.2;
          }
        }
      }
    }
  }
  bullets = bullets.filter(b => b.own !== 'x');

  trenchEnemies = trenchEnemies.filter(e => e.alive);

  explosions = explosions.filter(e => { e.t -= dt; return e.t > 0; });

  if (player.inv > 0 || player.shield > 0) return;

  for (const b of eBullets) {
    if (rectHit(b.x, b.y, 5, 5, player.x, player.y, 62, 44)) {
      b.own = 'x';
      hitPlayer();
      break;
    }
  }
  eBullets = eBullets.filter(b => b.own !== 'x');

  for (const e of trenchEnemies) {
    if (!e.alive) continue;
    if (rectHit(e.x, e.y, e.w, e.h, player.x, player.y, 64, 46)) {
      e.alive = false;
      mkExplosion(e.x, e.y, 34);
      SFX.explodeSmall();
      hitPlayer();
      break;
    }
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderScene() {
  ctx.save();
  if (GS.shake > 0) {
    const amp = GS.shake * 8;
    ctx.translate(rand(-amp, amp), rand(-amp, amp));
  }
  if (GS.phase === 'trench') {
    drawTrenchScene();
  }
  for (const e of explosions) drawExplosion(e);
  if (GS.phase === 'space') {
    for (const a of asteroids) drawAsteroid(a);
    if (mothership) drawMothership(mothership);
    for (const e of enemies) {
      if (!e.alive) continue;
      if (e.type === 'vader') drawDarkVader(e.x, e.y, e.anim, e.hp, e.maxHp, e.w);
      else drawTIE(e.x, e.y, e.type, e.anim, e.hp, e.maxHp);
    }
  } else {
    for (const e of trenchEnemies) {
      if (!e.alive) continue;
      drawTIE(e.x, e.y, e.type, e.anim, e.hp, e.maxHp);
    }
  }
  for (const b of bullets)  drawBullet(b);
  for (const b of eBullets) drawBullet(b);
  drawFalcon(player.x, player.y, player.inv > 0);
  ctx.restore();
}

function render() {
  // Space background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#05081a');
  bg.addColorStop(0.55, '#030611');
  bg.addColorStop(1, '#02030a');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  const nebula = ctx.createRadialGradient(W * 0.52, H * 0.12, 16, W * 0.52, H * 0.12, 240);
  nebula.addColorStop(0, 'rgba(255,170,64,0.08)');
  nebula.addColorStop(0.5, 'rgba(90,130,255,0.04)');
  nebula.addColorStop(1, 'transparent');
  ctx.fillStyle = nebula;
  ctx.fillRect(0, 0, W, H);

  // Scrolling stars
  for (const s of STARS) {
    s.y += s.spd;
    if (s.y > H) { s.y = 0; s.x = rand(0, W); }
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`; ctx.fill();
  }

  if (GS.mode === 'menu') { drawMenu(); return; }
  if (GS.mode === 'intro') { drawIntroCrawl(); return; }
  if (GS.mode === 'victory') { renderScene(); drawHUD(); drawVictoryScreen(); return; }
  if (GS.mode === 'over') { renderScene(); drawHUD(); drawOverScreen(); return; }
  if (GS.mode === 'pause') { renderScene(); drawHUD(); drawStatusBanner(); drawPauseScreen(); return; }
  if (GS.mode === 'cinematic') { renderScene(); drawHUD(); drawCinematicOverlay(); drawStatusBanner(); return; }

  renderScene();
  drawHUD();
  drawStatusBanner();
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  // Global input handling
  if (KP.Enter || KP.NumpadEnter) {
    if (GS.mode === 'menu' || GS.mode === 'over' || GS.mode === 'victory') {
      if (GS.mode === 'menu') startIntro();
      else startGame();
    } else if (GS.mode === 'pause') {
      GS.mode = 'play';
    } else if (GS.mode === 'intro') {
      startGame();
    }
  }
  if (KP.Escape && (GS.mode === 'play' || GS.mode === 'pause' || GS.mode === 'intro' || GS.mode === 'victory' || GS.mode === 'cinematic')) {
    if (GS.mode === 'intro') stopIntroMusic();
    if (GS.mode === 'play' || GS.mode === 'pause' || GS.mode === 'victory' || GS.mode === 'cinematic') stopBattleMusic();
    GS.mode = 'menu';
  }
  if (KP.KeyP) {
    if (GS.mode === 'play') GS.mode = 'pause';
    else if (GS.mode === 'pause') GS.mode = 'play';
  }
  if (KP.KeyM) {
    muted = !muted;
    if (masterGain) masterGain.gain.value = muted ? 0 : 0.55;
    introTrack.muted = muted;
    battleTrack.muted = muted;
    falconShootTrack.muted = muted;
  }

  update(dt);
  render();
  for (const k in KP) delete KP[k]; // clear just-pressed after each frame
  requestAnimationFrame(loop);
}

init();
GS.mode = 'menu';
syncViewport();
requestAnimationFrame(ts => { last = ts; requestAnimationFrame(loop); });
</script>
